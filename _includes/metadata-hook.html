<style>
  html[data-mode=dark],
  html:not([data-mode]) {
    --link-color: rgb(114, 224, 211) !important;
    --toc-highlight: rgb(114, 224, 211) !important;
    --checkbox-checked-color: rgb(114, 224, 211) !important;
    --btn-share-hover-color: rgb(114, 224, 211) !important;
  }
  html[data-mode=light] {
    --link-color: rgb(85, 195, 180) !important;
    --toc-highlight: rgb(85, 195, 180) !important;
    --checkbox-checked-color: rgb(85, 195, 180) !important;
    --btn-share-hover-color: rgb(85, 195, 180) !important;
  }
  @media (prefers-color-scheme: light) {
    html:not([data-mode]) {
      --link-color: rgb(85, 195, 180) !important;
      --toc-highlight: rgb(85, 195, 180) !important;
    }
  }

  #sidebar .profile-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-left: 0 !important;
    padding-right: 0 !important;
    text-align: center;
  }

  #sidebar #avatar {
    margin: 0 auto;
    width: 8rem !important;
    height: 8rem !important;
  }

  @media (min-width: 576px) {
    #sidebar #avatar {
      width: 8.5rem !important;
      height: 8.5rem !important;
    }
  }

  #sidebar #avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Sidebar bottom buttons */
  .sidebar-bottom {
    justify-content: flex-start !important;
    gap: 0.25rem;
  }

  /* Sidebar sub-nav (categories, project pages) */
  .sidebar-subnav {
    width: 100%;
    margin-bottom: 0.25rem;
  }
  .sidebar-subnav .nav {
    padding-left: 0;
    width: 100%;
  }
  .sidebar-sub-link {
    font-size: 1em;
    padding-top: 0.2rem !important;
    padding-bottom: 0.2rem !important;
    padding-left: 0rem !important;
    padding-right: 0.5rem !important;
    color: var(--sidebar-muted-color) !important;
    white-space: nowrap;
    width: 100%;
    display: flex !important;
    align-items: center;
  }
  .sidebar-sub-link:hover,
  .sidebar-sub-link.active {
    color: var(--sidebar-active-color) !important;
  }
  .sidebar-sub-count {
    margin-left: auto;
    font-size: 0.75em;
    opacity: 0.6;
    background: var(--sidebar-hover-bg);
    border-radius: 10px;
    padding: 0 6px;
  }
</style>

{% if page.layout == 'home' %}
<style>
  /* Disable Chirpy shimmer animation on home page */
  .shimmer::before { animation: none !important; background: none !important; }
  .shimmer { background: none !important; }
  #panel-wrapper { display: none !important; }
  #main-wrapper > .row > .col-xl-9 { max-width: 100% !important; flex: 0 0 100% !important; }

  /* Header */
  .home-profile {
    display: flex !important;
    align-items: flex-start;
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--main-border-color);
    margin-bottom: 0;
    gap: 1.5rem;
  }
  .home-profile-right { flex: 1; min-width: 0; }
  .home-name {
    font-size: 2rem;
    font-weight: 700;
    color: var(--heading-color);
    margin-bottom: 0.2rem;
  }
  .home-name-kr {
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--text-muted-color);
  }
  .home-affil {
    font-size: 1rem;
    color: var(--text-muted-color);
    margin-bottom: 0.6rem;
  }
  .home-links { display: flex; gap: 0.8rem; }
  .home-links a {
    font-size: 1.2rem;
    color: var(--sidebar-muted-color);
    text-decoration: none;
    transition: color 0.15s;
  }
  .home-links a:hover { color: var(--link-color); }

  /* CV Sections */
  .cv-section {
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--main-border-color);
  }
  .cv-section-title {
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--heading-color);
    margin-bottom: 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 2px solid var(--heading-color);
    display: inline-block;
  }
  .cv-entry {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    margin-top: 0.5rem;
  }
  .cv-entry-logo { flex-shrink: 0; width: 52px; height: 52px; }
  .cv-entry-logo img {
    width: 52px; height: 52px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--main-border-color);
  }
  .cv-entry-logo--rect img {
    border-radius: 6px !important;
    object-fit: contain !important;
    background: #fff;
  }
  .cv-logo-placeholder {
    display: none; width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--btn-border-color);
    color: var(--label-color);
    font-size: 0.85rem; font-weight: 700;
    align-items: center; justify-content: center;
    border: 1px solid var(--main-border-color);
  }
  .cv-entry-name { font-size: 1rem; font-weight: 700; color: var(--heading-color); margin-bottom: 0.15rem; }
  .cv-entry-date { font-size: 0.9rem; color: var(--text-muted-color); margin-bottom: 0.15rem; }
  .cv-entry-detail { font-size: 0.9rem; color: var(--text-muted-color); }

  /* Research Interests */
  .interest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 0.5rem; }
  .interest-card {
    border: 1px solid var(--main-border-color);
    border-radius: 10px; padding: 1.5rem 1rem;
    text-align: center; background: var(--card-bg);
    transition: box-shadow 0.15s;
  }
  .interest-card:hover { box-shadow: var(--card-shadow); }
  .interest-icon {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: rgb(114, 224, 211);
    margin: 0 auto 1rem;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .interest-icon img {
    width: 75% !important; height: 75% !important;
    object-fit: contain !important; display: block !important;
    margin: 0 !important; padding: 0 !important;
    position: absolute !important;
    top: 50% !important; left: 50% !important;
    transform: translate(-50%, -50%) !important;
  }
  .interest-title { font-size: 1rem; font-weight: 700; color: var(--heading-color); margin-bottom: 0.5rem; }
  .interest-desc { font-size: 0.85rem; color: var(--text-muted-color); line-height: 1.5; }

  /* Publication */
  .cv-pub-list { margin: 0; padding-left: 1rem; list-style: none; }
  .cv-pub-list li { margin-bottom: 0.5rem; }
  .cv-pub-title { font-size: 1rem; font-weight: 600; color: var(--heading-color); }
  .cv-pub-authors { font-size: 0.9rem; color: var(--text-muted-color); }
  .cv-pub-venue { font-size: 0.9rem; color: var(--text-muted-color); font-style: italic; }
  .cv-pub-links { font-size: 0.88rem; margin-left: 0.3rem; }
  .cv-pub-links a { color: var(--link-color); text-decoration: none; }
  .cv-pub-links a:hover { text-decoration: underline; }

  /* Tech Skills */
  .tech-grid { display: flex; flex-direction: column; margin-top: 0.5rem; width: 65%; }
  .tech-row {
    display: grid; grid-template-columns: 120px 1fr 1fr;
    align-items: center; padding: 0.35rem 0;
    border-bottom: 1px solid var(--tb-border-color);
  }
  .tech-row:last-child { border-bottom: none; }
  .tech-header-row { border-bottom: 1px solid var(--tb-border-color); padding-bottom: 0.3rem; }
  .tech-header { font-size: 0.8rem; font-weight: 600; color: var(--label-color); text-align: center; }
  .tech-cat { font-size: 0.88rem; font-weight: 500; color: var(--label-color); }
  .tech-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }
  .tk { display: inline-block; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em; padding: 0.2rem 0.6rem; border-radius: 4px; color: #fff; }
  .tk.py { background: #3776AB; } .tk.c { background: #A8B9CC; color: #222; }
  .tk.cpp { background: #00599C; } .tk.sql { background: #336791; }
  .tk.cuda { background: #76B900; } .tk.torch { background: #EE4C2C; }
  .tk.tf { background: #FF6F00; } .tk.linux { background: #FCC624; color: #222; }
  .tk.docker { background: #2496ED; } .tk.git { background: #F05032; }
  .tk.slack { background: #4A154B; } .tk.notion { background: #333; }
  .tk.jira { background: #0052CC; }

  /* Shared */
  .home-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.25rem; }
  .home-tag { font-size: 0.9rem; padding: 0.2rem 0.75rem; border-radius: 20px; background: var(--btn-border-color); color: var(--text-color); }
  .home-list { margin: 0.25rem 0 0; padding-left: 1.2rem; font-size: 1rem; color: var(--text-color); }
  .home-list a { color: var(--link-color); text-decoration: none; }
  .home-list a:hover { text-decoration: underline; }
  .contact-list a { color: var(--text-color) !important; }
  .home-badge { font-size: 0.72rem; background: #4f46e5; color: #fff; padding: 0.1rem 0.45rem; border-radius: 10px; vertical-align: middle; }
</style>
{% endif %}
